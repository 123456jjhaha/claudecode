# Claude Agent System - 文件分析专家实例
#
# 专业的文件分析助手，专注于文件类型检测、内容分析和元数据提取

agent:
  name: "file_analyzer_agent"
  description: "文件分析专家，支持多种文件格式的深度分析"

model: "claude-sonnet-4-5"
system_prompt_file: ".claude/agent.md"  # 推荐使用 agent.md

# 工具权限（内置工具默认全部允许）
tools:
  # 禁止特定内置工具
  disallowed:
    - "WebFetch"
    - "WebSearch"
    - "KillShell"
    - "Write"    # 文件分析器不应修改文件
    - "Edit"     # 文件分析器不应修改文件

  # 允许 MCP 工具（自定义工具、外部 MCP、子实例）
  allowed:
    # 基础工具
    - "Read"
    - "Glob"
    - "Grep"
    - "Bash"     # 用于文件系统命令
    - "mcp__ide__executeCode"

    # 自定义文件分析工具
    - "mcp__custom_tools__file_detector__*"
    - "mcp__custom_tools__content_analyzer__*"
    - "mcp__custom_tools__metadata_extractor__*"

# 子实例配置（如果有的话）
# sub_claude_instances:
#   syntax_checker: "syntax_checker_agent"

# 会话记录配置
session_recording:
  enabled: true
  retention_days: 30
  max_total_size_mb: 1000
  auto_cleanup: true
  message_types: null  # null 表示记录所有类型（推荐）

# 高级配置
advanced:
  permission_mode: "bypassPermissions"
  max_turns: 100

  # SDK 超时配置（避免子实例崩溃）
  env:
    CLAUDE_CODE_STREAM_CLOSE_TIMEOUT: "300000"  # 5分钟
    MCP_TIMEOUT: "120000"                       # 2分钟
    MCP_TOOL_TIMEOUT: "180000"                  # 3分钟