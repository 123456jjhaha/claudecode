# Claude Agent System - 示例配置
#
# 这是一个完整的配置示例，展示了所有可用的配置选项

# ==================== 基础配置 ====================
agent:
  name: "example_agent2"
  description: "示例智能体 - 演示 Claude Agent System 的功能"

# 模型选择
model: "claude-sonnet-4-5"

# 系统提示词文件（相对于实例目录）
system_prompt_file: ".claude/CLAUDE.md"

# 工作目录
cwd: "."

# ==================== 工具配置 ====================
tools:
  # 允许的工具列表（支持通配符 *）
  allowed:
    # 内置工具
    - "Read"
    - "Write"
    - "Edit"
    - "Bash"
    - "Glob"
    - "Grep"

    # 自定义工具（来自 tools/ 目录）
    # 格式：mcp__custom_tools__<模块名>__<工具名>
    # - "mcp__custom_tools__calculator__*"

    # 外部 MCP 工具（如果配置了 MCP 服务器）
    # - "mcp__weather__*"

    # 子实例工具（如果配置了子实例）
    # - "mcp__sub_instances__sub_claude_*"

  # 禁止的工具列表
  disallowed: []

# ==================== MCP 服务器配置 ====================
# MCP 服务器通过 .mcp.json 文件配置（放在实例目录下）
# 示例：instances/example_agent/.mcp.json
# 通过 allowed/disallowed 工具列表控制哪些 MCP 工具可用

# ==================== 子 Claude 实例配置 ====================
# 子实例配置（可选）
# sub_claude_instances:
  # 实例名: 实例目录路径（相对于 instances/ 目录）
  # example_agent2: "example_agent2"
  # document_writer: "document_writer_agent"

# ==================== 高级配置 ====================
advanced:
  # 权限模式
  # - "default": 默认模式，需要用户确认某些操作
  # - "acceptEdits": 自动接受编辑操作
  # - "plan": 计划模式，不执行操作
  # - "bypassPermissions": 绕过所有权限检查
  permission_mode: "acceptEdits"

  # 最大对话轮次
  max_turns: 50

  # 设置来源
  # - "project": 加载 .claude 目录配置
  # - "user": 加载用户全局配置
  # - "local": 加载本地配置
  setting_sources:
    - "project"

  # 环境变量（传递给 Claude）
  env: {}

  # 额外目录访问权限
  add_dirs: []
