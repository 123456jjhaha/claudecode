# Claude Agent System - 语法检查专家实例
#
# 专注于语法分析、错误检测和代码解析的轻量级助手

agent:
  name: "syntax_checker_agent"
  description: "语法检查专家，专注于代码语法分析和错误检测"

model: "claude-sonnet-4-5"
system_prompt_file: ".claude/agent.md"  # 推荐使用 agent.md

# 工具权限（内置工具默认全部允许）
tools:
  # 禁止特定内置工具
  disallowed:
    - "WebFetch"
    - "WebSearch"
    - "KillShell"
    - "Write"  # 语法检查器不应该修改文件
    - "Edit"   # 语法检查器不应该修改文件

  # 允许 MCP 工具（自定义工具、外部 MCP、子实例）
  allowed:
    # 基础工具
    - "Read"
    - "Glob"
    - "Grep"
    - "Bash"   # 用于运行语法检查命令
    - "mcp__ide__executeCode"
    - "mcp__ide__getDiagnostics"

    # 自定义语法检查工具
    - "mcp__custom_tools__parser__*"
    - "mcp__custom_tools__validator__*"

# 子实例配置（如果有的话）
# sub_claude_instances:
#   file_analyzer: "file_analyzer_agent"

# 会话记录配置
session_recording:
  enabled: true
  retention_days: 30
  max_total_size_mb: 500
  auto_cleanup: true
  message_types: null  # null 表示记录所有类型（推荐）

# 高级配置
advanced:
  permission_mode: "bypassPermissions"
  max_turns: 50  # 语法检查通常很快

  # SDK 超时配置（避免子实例崩溃）
  env:
    CLAUDE_CODE_STREAM_CLOSE_TIMEOUT: "300000"  # 5分钟
    MCP_TIMEOUT: "120000"                       # 2分钟
    MCP_TOOL_TIMEOUT: "180000"                  # 3分钟   